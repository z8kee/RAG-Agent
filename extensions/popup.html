<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>TechRAG</title>
  <style>
    body { font-family: sans-serif; width: 350px; padding: 10px; }
    #chat-box { height: 250px; overflow-y: scroll; border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; border-radius: 5px;}
    .message { margin-bottom: 8px; padding: 8px; border-radius: 5px; }
    .user-msg { background-color: #e3f2fd; text-align: right; }
    .bot-msg { background-color: #f1f8e9; text-align: left; }
    #controls { display: flex; gap: 5px; }
    input[type="text"] { flex-grow: 1; padding: 5px; }
    button { cursor: pointer; padding: 5px 10px; }
    #record-btn { background-color: #ffcccc; border: 1px solid red; }
    .recording { background-color: red !important; color: white; }
  </style>
</head>
<body>

  <h2>Tech News Assistant</h2>
  
  <div id="chat-box">
    <div class="message bot-msg">Hello! Ask me about recent tech news.</div>
  </div>

  <div id="controls">
    <input type="text" id="user-input" placeholder="Type a question...">
    <button id="send-btn">Send</button>
    <button id="record-btn">🎤</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
